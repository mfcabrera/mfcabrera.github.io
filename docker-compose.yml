# this file uses prebuilt image in dockerhub
services:
  jekyll:
    image: amirpourmand/al-folio:v0.16.3
    build: .
    # uncomment these if you are having this issue with the build:
    # /usr/local/bundle/gems/jekyll-4.3.4/lib/jekyll/site.rb:509:in `initialize': Permission denied @ rb_sysopen - /srv/jekyll/.jekyll-cache/.gitignore (Errno::EACCES)
    # and fill the args values with the output of the commands on the right
    # build:
    #   args:
    #     GROUPID: # id -g
    #     GROUPNAME: # id -gn
    #     USERID: # id -u
    #     USERNAME: # echo $USER
    ports:
      - 8080:8080
      - 35729:35729
    volumes:
      - .:/srv/jekyll
    environment:
      - JEKYLL_ENV=development
    # Override the image entrypoint so locally we preview posts that the
    # deploy build would exclude:
    #   --unpublished : show posts marked `published: false`
    #   --future      : show posts with a date in the future
    # The deploy workflow runs `jekyll build` without these flags, so
    # neither set is visible on mfcabrera.com.
    #
    # --drafts is intentionally NOT included: the al-folio sample posts
    # in _drafts/ have inter-post Liquid links that break the build.
    # Use `published: false` in _posts/ for your own drafts.
    command: >
      bash -c "
      git config --global --add safe.directory '*';
      bundle exec jekyll serve
      --watch --port=8080 --host=0.0.0.0 --livereload
      --force_polling --trace
      --unpublished --future
      "
